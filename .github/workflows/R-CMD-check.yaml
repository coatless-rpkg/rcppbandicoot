# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install clblast via Homebrew (macOS)
        if: runner.os == 'macOS'
        run: brew install clblast clblas

      - name: Install clblast via apt (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y opencl-headers ocl-icd-opencl-dev libclblast-dev

      - name: Install OpenCL headers and CLBlast (Windows)
        if: runner.os == 'Windows'
        run: |
          # Download OpenCL headers from Khronos
          Invoke-WebRequest -Uri "https://github.com/KhronosGroup/OpenCL-Headers/archive/refs/heads/main.zip" -OutFile opencl-headers.zip
          Expand-Archive -Path opencl-headers.zip -DestinationPath $env:USERPROFILE

          # Download CLBlast pre-built binaries
          Invoke-WebRequest -Uri "https://github.com/CNugteren/CLBlast/releases/download/1.6.3/CLBlast-1.6.3-windows-x64.7z" -OutFile clblast.7z
          7z x clblast.7z -o"$env:USERPROFILE"

          # Set environment variables for R package build (use forward slashes for gcc)
          $openclPath = "$env:USERPROFILE/OpenCL-Headers-main" -replace '\\', '/'
          $clblastPath = "$env:USERPROFILE/CLBlast-1.6.3-windows-x64" -replace '\\', '/'

          echo "OPENCL_CPPFLAGS=-I$openclPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CLBLAST_CPPFLAGS=-I$clblastPath/include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CLBLAST_LIBS=-L$clblastPath/lib -lclblast" | Out-File -FilePath $env:GITHUB_ENV -Append

          # Add CLBlast DLL to PATH for runtime
          echo "$clblastPath/lib" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
