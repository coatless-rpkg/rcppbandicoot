# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install clblast via Homebrew (macOS)
        if: runner.os == 'macOS'
        run: brew install clblast clblas clinfo

      - name: Install clblast via apt (Ubuntu)
        if: runner.os == 'Linux'
        run: | 
          sudo apt-get update
          sudo apt-get install -y \
          opencl-headers \
          ocl-icd-opencl-dev \ 
          libclblast-dev \
          clinfo

      - name: Cache Intel OpenCL Runtime
        if: runner.os == 'Windows'
        id: cache-opencl-win
        uses: actions/cache@v5
        with:
          # Default install location is x86 ... 
          path: C:\Program Files (x86)\Common Files\Intel\Shared Libraries
          key: intel-opencl-runtime-2025.3.1
          
      - name: Install OpenCL SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install opencl:x64-windows
          $vcpkgPath = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "OCL=$vcpkgPath" >> $env:GITHUB_ENV
          echo "OPENCL_INC=$vcpkgPath\include" >> $env:GITHUB_ENV
          echo "OPENCL_LIB64=$vcpkgPath\lib" >> $env:GITHUB_ENV
          
      - name: Install Intel CPU Runtime (Windows)
        if: runner.os == 'Windows' && steps.cache-opencl-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/ad824c04-01c8-4ae5-b5e8-164a04f67609/w_opencl_runtime_p_2025.3.1.762.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ocl.exe"
          Start-Process -FilePath "$env:TEMP\ocl.exe" -ArgumentList '-s','-a','--silent','--eula','accept' -Wait -NoNewWindow
          
      - name: Verify OpenCL installation
        shell: bash
        run: |
          if command -v clinfo &> /dev/null; then
            clinfo -l
          else
            echo "clinfo not available, skipping verification"
          fi
          

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
