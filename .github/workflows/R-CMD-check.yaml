# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install clblast via Homebrew (macOS)
        if: runner.os == 'macOS'
        run: brew install clblast clblas

      - name: Install clblast via apt (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y opencl-headers ocl-icd-opencl-dev libclblast-dev

      - name: Install Intel OpenCL CPU Runtime (Windows)
        if: runner.os == 'Windows'
        run: choco install opencl-intel-cpu-runtime -y

      - name: Install OpenCL and CLBlast (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Install OpenCL ICD Loader via vcpkg
          vcpkg install opencl:x64-windows

          # Download CLBlast pre-built binaries
          curl -L -o clblast.7z "https://github.com/CNugteren/CLBlast/releases/download/1.6.3/CLBlast-1.6.3-windows-x64.7z"
          7z x clblast.7z -o"$USERPROFILE"

          # Get vcpkg paths (use forward slashes for gcc)
          VCPKG_ROOT=$(cygpath -m "$VCPKG_INSTALLATION_ROOT")
          CLBLAST_PATH=$(cygpath -m "$USERPROFILE/CLBlast-1.6.3-windows-x64")

          echo "vcpkg root: $VCPKG_ROOT"
          echo "CLBlast path: $CLBLAST_PATH"

          # Set environment variables for R package build
          echo "OPENCL_CPPFLAGS=-I$VCPKG_ROOT/installed/x64-windows/include" >> $GITHUB_ENV
          echo "OPENCL_LIBS=-L$VCPKG_ROOT/installed/x64-windows/lib -lOpenCL" >> $GITHUB_ENV
          echo "CLBLAST_CPPFLAGS=-I$CLBLAST_PATH/include" >> $GITHUB_ENV
          echo "CLBLAST_LIBS=-L$CLBLAST_PATH/lib -lclblast" >> $GITHUB_ENV

          # Add DLLs to PATH for runtime loading
          # vcpkg OpenCL ICD loader
          VCPKG_BIN=$(cygpath -w "$VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin")
          echo "$VCPKG_BIN" >> $GITHUB_PATH
          # CLBlast DLL
          CLBLAST_BIN=$(cygpath -w "$USERPROFILE/CLBlast-1.6.3-windows-x64/lib")
          echo "$CLBLAST_BIN" >> $GITHUB_PATH

          # Debug: show DLL locations
          echo "=== DLL locations ==="
          ls -la "$VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/" || true
          ls -la "$USERPROFILE/CLBlast-1.6.3-windows-x64/lib/" || true

      - name: Verify OpenCL installation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Checking OpenCL ICD registry ==="
          Get-ChildItem "HKLM:\SOFTWARE\Khronos\OpenCL\Vendors" -ErrorAction SilentlyContinue | ForEach-Object {
            $name = $_.PSChildName
            Write-Host "  ICD: $name"
          }
          Write-Host ""
          Write-Host "=== Checking for OpenCL.dll in PATH ==="
          $opencl = Get-Command OpenCL.dll -ErrorAction SilentlyContinue
          if ($opencl) { Write-Host "  Found: $($opencl.Source)" }
          else { Write-Host "  OpenCL.dll not found in PATH" }
          Write-Host ""
          Write-Host "=== Checking for clblast.dll in PATH ==="
          $clblast = Get-Command clblast.dll -ErrorAction SilentlyContinue
          if ($clblast) { Write-Host "  Found: $($clblast.Source)" }
          else { Write-Host "  clblast.dll not found in PATH" }

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
