# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install clblast via Homebrew (macOS)
        if: runner.os == 'macOS'
        run: brew install clblast clblas

      - name: Install clblast via apt (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y opencl-headers ocl-icd-opencl-dev libclblast-dev

      - name: Install OpenCL and CLBlast (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Install OpenCL ICD Loader via vcpkg
          vcpkg install opencl:x64-windows

          # Download CLBlast pre-built binaries
          curl -L -o clblast.7z "https://github.com/CNugteren/CLBlast/releases/download/1.6.3/CLBlast-1.6.3-windows-x64.7z"
          7z x clblast.7z -o"$USERPROFILE"

          # Get vcpkg paths (use forward slashes for gcc)
          VCPKG_ROOT=$(cygpath -m "$VCPKG_INSTALLATION_ROOT")
          CLBLAST_PATH=$(cygpath -m "$USERPROFILE/CLBlast-1.6.3-windows-x64")

          echo "OpenCL installed via vcpkg at: $VCPKG_ROOT"
          echo "CLBlast at: $CLBLAST_PATH"

          # List installed files
          ls -la "$VCPKG_INSTALLATION_ROOT/installed/x64-windows/include/" || true
          ls -la "$VCPKG_INSTALLATION_ROOT/installed/x64-windows/lib/" || true
          ls -la "$USERPROFILE/CLBlast-1.6.3-windows-x64/" || true

          # Set environment variables for R package build
          echo "OPENCL_CPPFLAGS=-I$VCPKG_ROOT/installed/x64-windows/include" >> $GITHUB_ENV
          echo "OPENCL_LIBS=-L$VCPKG_ROOT/installed/x64-windows/lib -lOpenCL" >> $GITHUB_ENV
          echo "CLBLAST_CPPFLAGS=-I$CLBLAST_PATH/include" >> $GITHUB_ENV
          echo "CLBLAST_LIBS=-L$CLBLAST_PATH/lib -lclblast" >> $GITHUB_ENV

          # Add DLLs to PATH for runtime
          echo "$VCPKG_ROOT/installed/x64-windows/bin" >> $GITHUB_PATH
          echo "$CLBLAST_PATH/lib" >> $GITHUB_PATH

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
